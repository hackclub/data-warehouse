# Async WAL archiving. Without this, archive_command pushes one 16MB segment
# per invocation (process startup + TLS handshake + S3 PUT, serially), which
# caps throughput around ~3 segments/min — far below what heavy ETL generates.
# In June 2026 this let a 77k-segment (1.2TB) pg_wal backlog accumulate and
# nightly backups failed waiting on the archive queue.
#
# Repo/S3 settings come from PGBACKREST_* env vars on the container (see README).
[global]
archive-async=y
spool-path=/var/spool/pgbackrest

[global:archive-push]
process-max=8
