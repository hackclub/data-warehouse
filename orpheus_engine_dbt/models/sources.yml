  # Moonshot ended Dec 2025 and its Coolify DB is normally stopped, so this is a
  # one-time manual backfill (not a scheduled Sling mirror). To refresh: start the
  # DB (cd /data/coolify/databases/bkosggg48o4oosk8gs80cs40 && docker compose up -d
  # on coolify-app-server-a) and re-run the one-off pg_dump|psql mirror, then stop
  # it again. Credential tables (VerificationToken/Authenticator/Session) and token
  # columns (User.identityToken, Account OAuth tokens) are excluded from the mirror.
  - name: moonshot
    schema: moonshot
    quoting:
      identifier: true
    tables:
      - name: User
        description: "Moonshot users with email, hackatimeId, slack, and status (UserStatus enum incl. 'FraudSuspect'); token columns excluded from the manual mirror."
      - name: Project
        description: "Moonshot projects with userId, codeUrl, and shipped/viral flags (no timestamp columns)."
      - name: HackatimeProjectLink
        description: "Moonshot project↔Hackatime alias linkage (hackatimeName); banked rawHours/hoursOverride are reviewer totals, not daily activity."

  - name: carnival
    schema: carnival
    quoting:
      identifier: true
    tables:
      - name: user
        description: "Carnival users with email, slack_id, hackatime_user_id, and is_frozen ban flag; token/PII columns excluded from the Sling mirror."
        meta: { dagster: { deps: ['carnival_warehouse_mirror'] } }
      - name: project
        description: "Carnival projects with creator_id, code_url, and hackatime_project_name; banked hackatime_total_seconds/hours_spent_seconds kept for cross-check only."
        meta: { dagster: { deps: ['carnival_warehouse_mirror'] } }
      - name: project_hackatime_project
        description: "Carnival project↔Hackatime alias linkage (one row per alias), joined to global Hackatime in summer_unified_time_log."
        meta: { dagster: { deps: ['carnival_warehouse_mirror'] } }

